version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: novacart_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novacart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novacart"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novacart_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novacart_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/novacart
      - JWT_SECRET=super-secret-key-change-in-production-123456
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy
    networks:
      - novacart_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novacart_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - novacart_net

volumes:
  pgdata:

networks:
  novacart_net:
    driver: bridge
