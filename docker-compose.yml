services:
  db:
    image: postgres:15-alpine
    container_name: prathazon_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prathazon

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prathazon"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    networks:
      - prathazon_net

  backend:
    image: prathazon_backend
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: prathazon_backend

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/prathazon
      JWT_SECRET: super-secret-key-change-in-production-123456
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      WATCHFILES_FORCE_POLLING: "true"

    volumes:
      - ./backend:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - prathazon_net

  frontend:
    image: prathazon_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: prathazon_frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - prathazon_net

volumes:
  pgdata:

networks:
  prathazon_net:
    driver: bridge